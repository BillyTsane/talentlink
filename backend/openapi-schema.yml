components:
  schemas:
    AthleteProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/UserMe'
          readOnly: true
        sport:
          type: string
          maxLength: 64
        position:
          type: string
          maxLength: 64
        age:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        height_cm:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        weight_kg:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        bio:
          type: string
      required:
      - id
      - user
    CategoryEnum:
      enum:
      - match
      - training
      - skills
      type: string
      description: |-
        * `match` - Match
        * `training` - Training
        * `skills` - Skills
    Conversation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 160
        participant_ids:
          type: array
          items:
            type: integer
          readOnly: true
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - messages
      - participant_ids
    Message:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        conversation:
          type: integer
        sender:
          type: integer
          readOnly: true
        sender_username:
          type: string
          readOnly: true
        body:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - body
      - conversation
      - created_at
      - id
      - sender
      - sender_username
    Notification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        notification_type:
          $ref: '#/components/schemas/NotificationTypeEnum'
        title:
          type: string
          maxLength: 160
        body:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - notification_type
      - title
      - user
    NotificationTypeEnum:
      enum:
      - view
      - message
      - like
      type: string
      description: |-
        * `view` - View
        * `message` - Message
        * `like` - Like
    PatchedAthleteProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/UserMe'
          readOnly: true
        sport:
          type: string
          maxLength: 64
        position:
          type: string
          maxLength: 64
        age:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        height_cm:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        weight_kg:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        bio:
          type: string
    PatchedConversation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 160
        participant_ids:
          type: array
          items:
            type: integer
          readOnly: true
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    PatchedMessage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        conversation:
          type: integer
        sender:
          type: integer
          readOnly: true
        sender_username:
          type: string
          readOnly: true
        body:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
    PatchedNotification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        notification_type:
          $ref: '#/components/schemas/NotificationTypeEnum'
        title:
          type: string
          maxLength: 160
        body:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
    PatchedVideo:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        owner:
          type: integer
          readOnly: true
        owner_username:
          type: string
          readOnly: true
        title:
          type: string
          maxLength: 160
        description:
          type: string
        sport:
          type: string
          maxLength: 64
        category:
          $ref: '#/components/schemas/CategoryEnum'
        video_type:
          type: string
          maxLength: 64
        video_url:
          type: string
          format: uri
          maxLength: 200
        thumbnail_url:
          type: string
          format: uri
          maxLength: 200
        likes_count:
          type: integer
          readOnly: true
        views_count:
          type: integer
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    Register:
      type: object
      properties:
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        password:
          type: string
          writeOnly: true
        role:
          $ref: '#/components/schemas/RoleEnum'
        country:
          type: string
          maxLength: 64
        city:
          type: string
          maxLength: 64
      required:
      - password
      - username
    RoleEnum:
      enum:
      - player
      - club
      - agent
      type: string
      description: |-
        * `player` - Player
        * `club` - Club
        * `agent` - Agent
    Roles:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
      required:
      - label
      - value
    StatusEnum:
      enum:
      - draft
      - published
      type: string
      description: |-
        * `draft` - Draft
        * `published` - Published
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
