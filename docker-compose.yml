version: "3.9"

services:
  web:
    build: .
    command: bash -c "python manage.py migrate && gunicorn talentLink.wsgi:application -b 0.0.0.0:8000"
    env_file: .env
    ports:
      - "8081:8000"
    depends_on:
      - db
    volumes:
      - .:/app

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: billytsane.bt@gmail.com
      PGADMIN_DEFAULT_PASSWORD: talentlink
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
